<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Oichin SEO Toolkit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080c12;font-family:'Syne',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:48px 16px}
::placeholder{color:#3a4252}
input{font-family:'DM Mono',monospace;font-size:14px;background:#080c12;border:1px solid #1e2533;border-radius:8px;padding:12px 16px;color:#e8eaf0;width:100%;transition:border .2s}
input:focus{outline:none;border-color:#3b82f6}
button{cursor:pointer;border:none;transition:all .2s;font-family:'Syne',sans-serif}
button:hover:not(:disabled){opacity:.85;transform:translateY(-1px)}
button:disabled{cursor:not-allowed}
.badge{display:inline-block;background:#0d1117;border:1px solid #1e2533;border-radius:8px;padding:4px 14px;color:#3b82f6;font-size:11px;letter-spacing:.15em;text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:16px}
h1{color:#e8eaf0;font-size:clamp(24px,5vw,38px);font-weight:800;line-height:1.15;margin-bottom:10px;text-align:center}
h1 span{color:#3b82f6}
.subtitle{color:#4a5568;font-size:14px;font-family:'DM Mono',monospace;text-align:center;margin-bottom:40px}
.card{width:100%;max-width:680px;background:#0d1117;border:1px solid #1e2533;border-radius:16px;padding:32px;margin-bottom:24px}
.label{display:block;color:#4a5568;font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:8px}
.input-row{display:flex;gap:10px}
.input-row input{flex:1}
.btn-primary{background:#3b82f6;color:#fff;border-radius:8px;padding:12px 24px;font-size:14px;font-weight:700;white-space:nowrap}
.btn-primary:disabled{background:#1e2533;opacity:.6}
.error-box{width:100%;max-width:680px;background:#1a0a0a;border:1px solid #ff4e42;border-radius:12px;padding:20px;color:#ff4e42;font-family:'DM Mono',monospace;font-size:13px;margin-bottom:16px}
.results{width:100%;max-width:680px;animation:fadeIn .5s ease}
.score-grid{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.device-card{background:#0d1117;border:1px solid #1e2533;border-radius:12px;padding:24px;flex:1;min-width:260px}
.device-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.device-label{color:#e8eaf0;font-weight:700;font-size:14px;letter-spacing:.1em;text-transform:uppercase;font-family:'DM Mono',monospace}
.metric-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1e2533}
.metric-name{color:#8892a4;font-size:13px;font-family:'DM Mono',monospace}
.metric-val{display:flex;align-items:center;gap:8px}
.metric-val span{color:#e8eaf0;font-size:13px;font-weight:600;font-family:'DM Mono',monospace}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.progress-card{background:#0d1117;border:1px solid #1e2533;border-radius:12px;padding:24px;display:flex;flex-direction:column;gap:8px}
.progress-label{color:#4a5568;font-size:12px;font-family:'DM Mono',monospace;margin-bottom:4px}
.step{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:8px;font-family:'DM Mono',monospace;font-size:12px;background:#080c12;border:1px solid #1e2533;color:#4a5568;transition:all .3s}
.step.active{border-color:#3b82f6;color:#3b82f6;background:#0a1020}
.step.done{border-color:#0cce6b44;color:#0cce6b;background:#0a1a0a}
.step.error{border-color:#ff4e42;color:#ff4e42;background:#1a0808}
.step-icon{font-size:16px;min-width:20px;text-align:center;margin-top:1px}
.step-text{flex:1}
.step-title{font-weight:600}
.step-detail{font-size:11px;opacity:.8;margin-top:4px;line-height:1.6;white-space:pre-line}
.btn-copy{background:#080c12;border:1px solid #1e2533;border-radius:8px;padding:10px 20px;color:#4a5568;font-size:13px;font-family:'DM Mono',monospace;text-align:center;width:100%;margin-top:4px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite;display:inline-block}
</style>
</head>
<body>

<div class="badge">Oichin SEO Toolkit</div>
<h1>PageSpeed &amp; GSC<br><span>Inspector</span></h1>
<p class="subtitle">Nhập URL → Kiểm tra → Xong</p>

<div class="card">
  <label class="label">URL cần kiểm tra</label>
  <div class="input-row">
    <input type="text" id="urlInput" placeholder="https://oichin.net/san-pham/..." />
    <button class="btn-primary" id="btnRun" onclick="handleRun()">Kiểm tra</button>
  </div>
</div>

<div id="errorBox" style="display:none" class="error-box"></div>

<div id="results" style="display:none" class="results">
  <!-- Score cards (hiện sau khi pagespeed xong) -->
  <div class="score-grid" id="scoreGrid" style="display:none">
    <div class="device-card" id="mobileCard"></div>
    <div class="device-card" id="desktopCard"></div>
  </div>

  <!-- Progress steps -->
  <div class="progress-card">
    <p class="progress-label">TIẾN TRÌNH</p>
    <div class="step" id="stepPagespeed">
      <span class="step-icon" id="iconPagespeed">⏳</span>
      <div class="step-text">
        <div class="step-title">Phân tích PageSpeed</div>
        <div class="step-detail" id="detailPagespeed">Đang chạy Mobile &amp; Desktop...</div>
      </div>
    </div>
    <div class="step" id="stepGSC">
      <span class="step-icon" id="iconGSC">⏳</span>
      <div class="step-text">
        <div class="step-title">Submit Google Search Console</div>
        <div class="step-detail" id="detailGSC">Chờ PageSpeed hoàn tất...</div>
      </div>
    </div>
    <div class="step" id="stepEmail">
      <span class="step-icon" id="iconEmail">⏳</span>
      <div class="step-text">
        <div class="step-title">Gửi báo cáo email</div>
        <div class="step-detail" id="detailEmail">Chờ các bước trước...</div>
      </div>
    </div>
    <button class="btn-copy" id="btnCopy" style="display:none" onclick="handleCopy()">📋 Copy báo cáo dạng text</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
const GSC_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby8Y5wQrXhJxXWtwOJGol-sd8N_m5JSGSuQO0MVR4zNo7eevHzB9sMxNhC-_6HBP-e3/exec";
const GSC_TOKEN = "oichin2024gsc";
const EMAILJS_SERVICE_ID = "service_imgjwwp";
const EMAILJS_TEMPLATE_ID = "template_hrn1opm";
const EMAILJS_PUBLIC_KEY = "Cyt1d0NbVmXtKGx9x";
const REPORT_EMAIL = "quypham.adw@gmail.com";

let resultData = { mobile: null, desktop: null };
let gscStatusText = "Chưa submit";
let gscMsg = "";
let currentUrl = "";

function normalizeUrl(u) {
  u = u.trim();
  if (!u.startsWith("http")) u = "https://" + u;
  return u;
}

function callScript(body) {
  return fetch(GSC_SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(body)
  }).then(r => r.json());
}

function metricColor(s) { return s >= 0.9 ? "#0cce6b" : s >= 0.5 ? "#ffa400" : "#ff4e42"; }
function scoreColor(s) { return s >= 90 ? "#0cce6b" : s >= 50 ? "#ffa400" : "#ff4e42"; }

function renderRing(score) {
  const c = scoreColor(score);
  const r = 28, circ = 2 * Math.PI * r, dash = (score / 100) * circ;
  return `<svg width="72" height="72" viewBox="0 0 72 72">
    <circle cx="36" cy="36" r="${r}" fill="none" stroke="#1e2533" stroke-width="6"/>
    <circle cx="36" cy="36" r="${r}" fill="none" stroke="${c}" stroke-width="6"
      stroke-dasharray="${dash} ${circ}" stroke-linecap="round" transform="rotate(-90 36 36)"/>
    <text x="36" y="41" text-anchor="middle" fill="${c}" font-size="15" font-weight="700" font-family="'DM Mono',monospace">${score}</text>
  </svg>`;
}

function renderDevice(data, label) {
  const score = Math.round((data?.lighthouseResult?.categories?.performance?.score ?? 0) * 100);
  const audits = data?.lighthouseResult?.audits ?? {};
  const metrics = [
    { name: "LCP", key: "largest-contentful-paint" },
    { name: "CLS", key: "cumulative-layout-shift" },
    { name: "TBT", key: "total-blocking-time" },
    { name: "FCP", key: "first-contentful-paint" },
    { name: "Speed Index", key: "speed-index" },
  ];
  const rows = metrics.map(m => {
    const a = audits[m.key];
    if (!a) return "";
    return `<div class="metric-row">
      <span class="metric-name">${m.name}</span>
      <div class="metric-val"><span>${a.displayValue ?? "—"}</span>
      <span class="dot" style="background:${metricColor(a.score ?? 0)}"></span></div>
    </div>`;
  }).join("");
  return `<div class="device-header"><span class="device-label">${label}</span>${renderRing(score)}</div>${rows}`;
}

function getMetric(d, key) { return d?.lighthouseResult?.audits?.[key]?.displayValue ?? "N/A"; }
function getScore(d) { return d ? Math.round((d.lighthouseResult?.categories?.performance?.score ?? 0) * 100) : "N/A"; }

function setStep(id, state, detail) {
  const el = document.getElementById("step" + id);
  el.className = "step " + state;
  const iconMap = { active: '<span class="spin">⟳</span>', done: "✅", error: "❌", idle: "⏳" };
  document.getElementById("icon" + id).innerHTML = iconMap[state] || "⏳";
  if (detail !== undefined) document.getElementById("detail" + id).innerHTML = detail;
}

function buildReport() {
  const now = new Date().toLocaleString("vi-VN");
  return `📊 BÁO CÁO PAGESPEED
━━━━━━━━━━━━━━━━━━━━━━━
URL: ${currentUrl}
Thời gian: ${now}
GSC Submit: ${gscStatusText}${gscMsg ? "\n" + gscMsg : ""}

📱 MOBILE
Score: ${getScore(resultData.mobile)}/100
LCP: ${getMetric(resultData.mobile, "largest-contentful-paint")}
CLS: ${getMetric(resultData.mobile, "cumulative-layout-shift")}
TBT: ${getMetric(resultData.mobile, "total-blocking-time")}
FCP: ${getMetric(resultData.mobile, "first-contentful-paint")}

🖥 DESKTOP
Score: ${getScore(resultData.desktop)}/100
LCP: ${getMetric(resultData.desktop, "largest-contentful-paint")}
CLS: ${getMetric(resultData.desktop, "cumulative-layout-shift")}
TBT: ${getMetric(resultData.desktop, "total-blocking-time")}
FCP: ${getMetric(resultData.desktop, "first-contentful-paint")}`.trim();
}

async function handleRun() {
  const raw = document.getElementById("urlInput").value;
  if (!raw.trim()) return;
  currentUrl = normalizeUrl(raw);
  gscStatusText = "Chưa submit"; gscMsg = "";

  const btnRun = document.getElementById("btnRun");
  btnRun.disabled = true;
  btnRun.innerHTML = '<span class="spin">⟳</span>';

  document.getElementById("errorBox").style.display = "none";
  document.getElementById("scoreGrid").style.display = "none";
  document.getElementById("btnCopy").style.display = "none";
  document.getElementById("results").style.display = "block";

  // Reset steps
  setStep("Pagespeed", "active", "Đang chạy Mobile &amp; Desktop...");
  setStep("GSC", "idle", "Chờ PageSpeed hoàn tất...");
  setStep("Email", "idle", "Chờ các bước trước...");

  // ── Bước 1: PageSpeed ──
  try {
    const data = await callScript({ token: GSC_TOKEN, action: "pagespeed", url: currentUrl });
    if (!data.success) throw new Error(data.error || "Lỗi không xác định");
    resultData = { mobile: data.mobile, desktop: data.desktop };

    document.getElementById("mobileCard").innerHTML = renderDevice(data.mobile, "📱 Mobile");
    document.getElementById("desktopCard").innerHTML = renderDevice(data.desktop, "🖥 Desktop");
    document.getElementById("scoreGrid").style.display = "flex";

    const ms = getScore(data.mobile), ds = getScore(data.desktop);
    setStep("Pagespeed", "done", `Mobile: ${ms}/100 · Desktop: ${ds}/100`);
  } catch(e) {
    setStep("Pagespeed", "error", e.message);
    setStep("GSC", "error", "Bỏ qua do PageSpeed thất bại");
    setStep("Email", "error", "Bỏ qua do PageSpeed thất bại");
    document.getElementById("errorBox").style.display = "block";
    document.getElementById("errorBox").textContent = "❌ " + e.message;
    btnRun.disabled = false; btnRun.textContent = "Kiểm tra";
    return;
  }

  // ── Bước 2: GSC ──
  setStep("GSC", "active", "Đang gọi GSC API...");
  try {
    const data = await callScript({ token: GSC_TOKEN, action: "gsc", url: currentUrl });
    if (data.success) {
      const cs = data.data?.inspectionResult?.indexStatusResult?.coverageState ?? "";
      const is = data.data?.inspectionResult?.indexStatusResult?.indexingState ?? "";
      gscMsg = [cs ? "Trạng thái: " + cs : "", is ? "Indexing: " + is : ""].filter(Boolean).join("\n") || "Đã gửi yêu cầu thành công";
      gscStatusText = "✅ Đã submit thành công";
      setStep("GSC", "done", gscMsg);
    } else {
      gscStatusText = "⚠️ Lỗi submit";
      gscMsg = data.error || "Lỗi không xác định";
      setStep("GSC", "error", gscMsg);
    }
  } catch(e) {
    gscStatusText = "⚠️ Lỗi kết nối";
    gscMsg = e.message;
    setStep("GSC", "error", "Lỗi kết nối: " + e.message);
  }

  // ── Bước 3: Email ──
  setStep("Email", "active", "Đang gửi...");
  try {
    emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });
    const now = new Date().toLocaleString("vi-VN");
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      to_email: REPORT_EMAIL,
      url: currentUrl,
      checked_at: now,
      gsc_status: gscStatusText + (gscMsg ? "\n" + gscMsg : ""),
      mobile_score: getScore(resultData.mobile),
      mobile_lcp: getMetric(resultData.mobile, "largest-contentful-paint"),
      mobile_cls: getMetric(resultData.mobile, "cumulative-layout-shift"),
      mobile_tbt: getMetric(resultData.mobile, "total-blocking-time"),
      mobile_fcp: getMetric(resultData.mobile, "first-contentful-paint"),
      desktop_score: getScore(resultData.desktop),
      desktop_lcp: getMetric(resultData.desktop, "largest-contentful-paint"),
      desktop_cls: getMetric(resultData.desktop, "cumulative-layout-shift"),
      desktop_tbt: getMetric(resultData.desktop, "total-blocking-time"),
      desktop_fcp: getMetric(resultData.desktop, "first-contentful-paint"),
      report_text: buildReport(),
    });
    setStep("Email", "done", "Đã gửi tới " + REPORT_EMAIL);
  } catch(e) {
    setStep("Email", "error", "Gửi thất bại: " + (e?.text || e?.message));
  }

  document.getElementById("btnCopy").style.display = "block";
  btnRun.disabled = false;
  btnRun.textContent = "Kiểm tra";
}

function handleCopy() {
  navigator.clipboard.writeText(buildReport()).then(() => {
    const btn = event.target;
    btn.textContent = "✅ Đã copy!";
    setTimeout(() => btn.textContent = "📋 Copy báo cáo dạng text", 2000);
  });
}

document.getElementById("urlInput").addEventListener("keydown", e => {
  if (e.key === "Enter") handleRun();
});
</script>
</body>
</html>
